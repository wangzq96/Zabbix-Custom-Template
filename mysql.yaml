zabbix_export:
  version: '7.0'
  template_groups:
    - uuid: 5b250e5b377a494e92556c1e7b119187
      name: prod
  templates:
    - uuid: 05c79544530a4e12b283b8e4f38abc54
      template: mysql
      name: mysql
      vendor:
        name: wzq
        version: '1.0'
      groups:
        - name: prod
      items:

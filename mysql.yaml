          name: 'mysql 3306 process'
          type: ZABBIX_ACTIVE
          key: 'proc.num[,mysql,,my.cnf]'
          history: 2d
          trends: 2d
          triggers:
            - uuid: b4b7b4b9f8dd417ca3abc6ef66eca6b1
              expression: 'min(/mysql/proc.num[,mysql,,my.cnf],2m)=0'
              name: 'mysql 3306 process 异常'
              priority: WARNING
              manual_close: 'YES'
        - uuid: 35520bcb8e0345f1897d5657e0655ce6
          name: 'mysql 3307 process'
          type: ZABBIX_ACTIVE
          key: 'proc.num[,mysql,,my3307.cnf]'

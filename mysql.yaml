          key: mysql.replication
          history: 2d
          trends: 2d
          triggers:
            - uuid: d6a31b0a3c5e4604b24d1a3215111339
              expression: last(/mysql/mysql.replication)<>2
              name: mysql主从3307端口异常
              priority: WARNING
              manual_close: 'YES'
        - uuid: eef63457672d41ee97455449b3b3ca28
          name: 'mysql port 3307'
          type: ZABBIX_ACTIVE
          key: 'net.tcp.listen[{$MYSQL_PORT2}]'
          history: 2d
          trends: 2d
          triggers:
            - uuid: a0203fd83a434a749322cecf7aaca401
              expression: 'last(/mysql/net.tcp.listen[{$MYSQL_PORT2}])=0'
              name: 'mysql port 3307异常'
              priority: WARNING
              manual_close: 'YES'
        - uuid: df4e250f92804592b0c7f54bad9123c2
          name: 'mysql port 3306'
          type: ZABBIX_ACTIVE
          key: 'net.tcp.listen[{$MYSQL_PORT}]'
          history: 2d
          trends: 2d
          triggers:
            - uuid: 0c985e802a2a43889ba2292194b2e425
              expression: 'last(/mysql/net.tcp.listen[{$MYSQL_PORT}])=0'
              name: 'mysql port 3306异常'
              priority: WARNING
              manual_close: 'YES'

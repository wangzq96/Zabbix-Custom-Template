zabbix_export:
  version: '7.0'
  template_groups:
    - uuid: 5b250e5b377a494e92556c1e7b119187
      name: prod
  templates:
    - uuid: e80d67da214d4604ba2b55757b26ad21
      template: 'Windows zabbix agent customize active'
      name: 'Windows zabbix agent customize active'
      description: Windows自定义监控
      vendor:
        name: wzq
        version: '1.0'
      groups:
        - name: prod
      items:
        - uuid: 8f64f61ee35e42b09fe33309f0523b34
          name: 'Zabbix agent ping'
          type: ZABBIX_ACTIVE
          key: agent.ping
          description: 代理始终为此项目返回“1”。可以与`nodata（）`结合使用以进行可用性检查。
          valuemap:
            name: 'Zabbix agent ping status'
          tags:
            - tag: component
              value: system
          triggers:
            - uuid: 29571328c08c48d7b419d51f0f33f748
              expression: 'nodata(/Windows zabbix agent customize active/agent.ping,{$AGENT.NODATA_TIMEOUT})=1'
              name: Windows：Zabbix无法ping通
              event_name: 'Windows：Zabbix无法ping通 (or nodata for {$AGENT.NODATA_TIMEOUT})'
              priority: AVERAGE
              description: 'For active agents, `nodata()` with `agent.ping` is used with `{$AGENT.NODATA_TIMEOUT}` as a time threshold.'
              manual_close: 'YES'
              tags:
                - tag: scope
                  value: availability
        - uuid: 0b38e0df75584d0eb4245412bc513712
          name: 'zabbix agent版本'
          type: ZABBIX_ACTIVE
          key: agent.version
          delay: 1h
          value_type: CHAR
          trends: '0'
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1d
          tags:
            - tag: component
              value: application
        - uuid: 331de79f8c5e439d9597db284f68685c
          name: CPU利用率
          type: ZABBIX_ACTIVE
          key: system.cpu.util
          value_type: FLOAT
          units: '%'
          description: CPU利用率以%表示。
          tags:
            - tag: component
              value: cpu
          triggers:
            - uuid: 93764572edfe48dcb482183b8947daf1
              expression: 'min(/Windows zabbix agent customize active/system.cpu.util,5m)>{$CPU.UTIL.CRIT}'
              name: Windows：CPU利用率高
              event_name: 'Windows：CPU利用率高(over {$CPU.UTIL.CRIT}% for 5m)'
              opdata: 'Current utilization: {ITEM.LASTVALUE1}'
              priority: WARNING
              description: CPU利用率过高。系统响应速度可能会变慢。
              tags:
                - tag: scope
                  value: performance
        - uuid: e70ceb6170ce4870aede723a93375f7a
          name: 主机名
          type: ZABBIX_ACTIVE
          key: system.hostname
          delay: 1h
          value_type: CHAR
          trends: '0'
          description: 系统主机名
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1d
          tags:
            - tag: component
              value: system
        - uuid: be036ca071024c53a39c8d99c37fd3f1
          name: 主机运行时长
          type: ZABBIX_ACTIVE
          key: system.uptime
          delay: 30s
          trends: '0'
          units: uptime
          description: '系统正常运行时间以以下格式表示：“N天，hh:mm:ss”。'
          tags:
            - tag: component
              value: system
          triggers:
            - uuid: 86b1069ab9564872860cd406a2b1095d
              expression: 'last(/Windows zabbix agent customize active/system.uptime)<10m'
              name: Windows：主机已重新启动
              event_name: 'Windows：主机已重新启动 (uptime < 10m)'
              priority: WARNING
              description: 设备正常运行时间少于10分钟。
              manual_close: 'YES'
              tags:
                - tag: scope
                  value: notice
        - uuid: 814750ae4b834f97927cf8915dc1b04d
          name: 获取文件系统
          type: ZABBIX_ACTIVE
          key: vfs.fs.get
          history: '0'
          value_type: TEXT
          trends: '0'
          description: '`vfs.fs.get`键获取有关文件系统的原始信息集。稍后通过相关项的预处理进行提取。'
          tags:
            - tag: component
              value: raw
        - uuid: ccf7d2f3d01f45f18ddaa9c490d09c7f
          name: 总内存
          type: ZABBIX_ACTIVE
          key: 'vm.memory.size[total]'
          units: B
          description: 以字节表示的总内存。
          tags:
            - tag: component
              value: memory
        - uuid: 1272da0c81af48789cfb497ec38b8d28
          name: 已用内存
          type: ZABBIX_ACTIVE
          key: 'vm.memory.size[used]'
          units: B
          description: 已用内存（以字节为单位）。
          tags:
            - tag: component
              value: memory
        - uuid: 541b497435ca4fd2828c163a666eadaa
          name: 内存利用率
          type: CALCULATED
          key: vm.memory.util
          value_type: FLOAT
          units: '%'
          params: 'last(//vm.memory.size[used]) / last(//vm.memory.size[total]) * 100'
          description: 内存利用率（%）。
          tags:
            - tag: component
              value: memory
          triggers:
            - uuid: 1f0688c63d0349f389b80ef817aa5e3d
              expression: 'min(/Windows zabbix agent customize active/vm.memory.util,5m)>{$MEMORY.UTIL.MAX}'
              name: Windows：内存利用率高
              event_name: 'Windows：内存利用率高(>{$MEMORY.UTIL.MAX}% for 5m)'
              priority: AVERAGE
              description: 系统可用内存即将耗尽。
              tags:
                - tag: scope
                  value: capacity
                - tag: scope
                  value: performance
        - uuid: b9c220ba8c304a5695f010deab19dfa6
          name: 'Windows:网络接口WMI获取'
          type: ZABBIX_ACTIVE
          key: 'wmi.getall[root\cimv2,"select Name,Description,NetConnectionID,Speed,AdapterTypeId,NetConnectionStatus,GUID from win32_networkadapter where PhysicalAdapter=True and NetConnectionStatus>0"]'
          history: '0'
          value_type: TEXT
          trends: '0'
          description: '`win32_networkadapter的原始数据`'
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1h
          tags:
            - tag: component
              value: raw
        - uuid: 061187e1a3ec44dea647be765a0da9f3
          name: agent状态
          type: INTERNAL
          key: 'zabbix[host,active_agent,available]'
          description: |
            主机上活动检查的可用性。此项的值对应于主机列表中的可用性图标。
            可能值：
            0-未知
            1-可用
            2-不可用
          valuemap:
            name: zabbix.host.active_agent.available
          tags:
            - tag: component
              value: health
            - tag: component
              value: network
          triggers:
            - uuid: faea81e6e0154d01b57d6528b9c34291
              expression: 'min(/Windows zabbix agent customize active/zabbix[host,active_agent,available],{$AGENT.TIMEOUT})=2'
              name: 'Windows：zabbix agent不可用'
              event_name: 'Windows：zabbix agent不可用'
              opdata: 'Current state: {ITEM.LASTVALUE1}'
              priority: HIGH
              description: 活动检查被视为不可用。代理长时间未发送心跳信号。
              tags:
                - tag: scope
                  value: availability
      discovery_rules:
        - uuid: 19b0cae796ee42508f2d349290dfa09c
          name: 网络发现
          type: DEPENDENT
          key: net.if.discovery
          delay: '0'
          filter:
            evaltype: AND
            conditions:
              - macro: '{#IFALIAS}'
                value: '{$NET.IF.IFALIAS.MATCHES}'
                formulaid: A
              - macro: '{#IFALIAS}'
                value: '{$NET.IF.IFALIAS.NOT_MATCHES}'
                operator: NOT_MATCHES_REGEX
                formulaid: B
              - macro: '{#IFDESCR}'
                value: '{$NET.IF.IFDESCR.MATCHES}'
                formulaid: C
              - macro: '{#IFDESCR}'
                value: '{$NET.IF.IFDESCR.NOT_MATCHES}'
                operator: NOT_MATCHES_REGEX
                formulaid: D
              - macro: '{#IFNAME}'
                value: '{$NET.IF.IFNAME.MATCHES}'
                formulaid: E
              - macro: '{#IFNAME}'
                value: '{$NET.IF.IFNAME.NOT_MATCHES}'
                operator: NOT_MATCHES_REGEX
                formulaid: F
          description: 发现已安装的网络接口。
          item_prototypes:
            - uuid: cbede8e19a994c86ae2cc74a9edcdcc1
              name: '网卡{#IFNAME}({#IFALIAS}): 接收Bits'
              type: ZABBIX_ACTIVE
              key: 'net.if.in["{#IFGUID}"]'
              delay: 3m
              units: bps
              description: 网络接口上的传入流量。
              preprocessing:
                - type: CHANGE_PER_SECOND
                  parameters:
                    - ''
                - type: MULTIPLIER
                  parameters:
                    - '8'
              tags:
                - tag: component
                  value: network
                - tag: description
                  value: '{#IFALIAS}'
                - tag: interface
                  value: '{#IFNAME}'
            - uuid: db3f0b296524401fad01f7da1dffa21e
              name: '网卡{#IFNAME}({#IFALIAS}): 发送Bits'
              type: ZABBIX_ACTIVE
              key: 'net.if.out["{#IFGUID}"]'
              delay: 3m
              units: bps
              description: 网络接口上的传出流量。
              preprocessing:
                - type: CHANGE_PER_SECOND
                  parameters:
                    - ''
                - type: MULTIPLIER
                  parameters:
                    - '8'
              tags:
                - tag: component
                  value: network
                - tag: description
                  value: '{#IFALIAS}'
                - tag: interface
                  value: '{#IFNAME}'
            - uuid: 0f5778f5477a451eb24482020f036bc1
              name: '网卡 {#IFNAME}({#IFALIAS}): 运行状态'
              type: DEPENDENT
              key: 'net.if.status["{#IFGUID}"]'
              delay: '0'
              trends: '0'
              description: 网络接口的运行状态。
              valuemap:
                name: 'Win32_NetworkAdapter::NetConnectionStatus'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$[?(@.GUID == "{#IFGUID}")].NetConnectionStatus.first()'
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1d
              master_item:
                key: 'wmi.getall[root\cimv2,"select Name,Description,NetConnectionID,Speed,AdapterTypeId,NetConnectionStatus,GUID from win32_networkadapter where PhysicalAdapter=True and NetConnectionStatus>0"]'
              tags:
                - tag: component
                  value: network
                - tag: description
                  value: '{#IFALIAS}'
                - tag: interface
                  value: '{#IFNAME}'
              trigger_prototypes:
                - uuid: e02a668abbf5475fbea547542a305a7c
                  expression: 'last(/Windows zabbix agent customize active/net.if.status["{#IFGUID}"])<>2 and (last(/Windows zabbix agent customize active/net.if.status["{#IFGUID}"],#1)<>last(/Windows zabbix agent customize active/net.if.status["{#IFGUID}"],#2))'
                  recovery_mode: RECOVERY_EXPRESSION
                  recovery_expression: 'last(/Windows zabbix agent customize active/net.if.status["{#IFGUID}"])=2'
                  name: 'Windows：接口{#IFNAME}({#IFALIAS})：链接已断开'
                  opdata: '当前状态: {ITEM.LASTVALUE1}'
                  priority: AVERAGE
                  description: |
                    此触发表达式的工作原理如下：
                    1. 如果操作状态为关闭，则可能会触发此事件。
                    2. `{$IFCONTROL:"{#IFNAME}"}=1` - 用户可以将上下文宏重新定义为“0”，表示此接口不重要。
                    如果此接口关闭，则不会触发任何新触发器。
                    3. `last(/TEMPLATE_NAME/METRIC,#1)<>last(/TEMPLATE_NAME/METRIC,#2)` - 仅当操作状态在（1）之前的某个时间点处于开启状态时，触发器才会触发（因此，对于“永久关闭”的接口，触发器不会触发）
                    
                    警告：如果手动关闭，由于.diff的原因，它在下次轮询时将不会再次触发。
                  manual_close: 'YES'
                  tags:
                    - tag: scope
                      value: availability
          master_item:
            key: 'wmi.getall[root\cimv2,"select Name,Description,NetConnectionID,Speed,AdapterTypeId,NetConnectionStatus,GUID from win32_networkadapter where PhysicalAdapter=True and NetConnectionStatus>0"]'
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  output = JSON.parse(value).map(function(net){
                  	return {
                  		"{#IFNAME}": net.Name,
                  		"{#IFDESCR}": net.Description,
                  		"{#IFALIAS}": net.NetConnectionID,
                  		"{#IFGUID}": net.GUID
                  	}})
                  return JSON.stringify({"data": output})
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1h
        - uuid: ca41d71201d345edb57be4c2ab890895
          name: 'Windows 服务自动发现'
          type: ZABBIX_ACTIVE
          key: service.discovery
          delay: 30s
          status: DISABLED
          filter:
            evaltype: AND
            conditions:
              - macro: '{#SERVICE.NAME}'
                value: '{$SERVICE.NAME.MATCHES}'
                formulaid: A
              - macro: '{#SERVICE.NAME}'
                value: '{$SERVICE.NAME.NOT_MATCHES}'
                operator: NOT_MATCHES_REGEX
                formulaid: B
              - macro: '{#SERVICE.STARTUPNAME}'
                value: '{$SERVICE.STARTUPNAME.MATCHES}'
                formulaid: C
              - macro: '{#SERVICE.STARTUPNAME}'
                value: '{$SERVICE.STARTUPNAME.NOT_MATCHES}'
                operator: NOT_MATCHES_REGEX
                formulaid: D
          description: 用于发现模板宏中定义的不同类型Windows服务。
          item_prototypes:
            - uuid: 766bfb4482b94dee81f995e3c59dad73
              name: '服务状态 "{#SERVICE.NAME}" ({#SERVICE.DISPLAYNAME})'
              type: ZABBIX_ACTIVE
              key: 'service.info["{#SERVICE.NAME}",state]'
              valuemap:
                name: 'Windows service state'
              tags:
                - tag: component
                  value: system
                - tag: name
                  value: '{#SERVICE.DISPLAYNAME}'
                - tag: service
                  value: '{#SERVICE.NAME}'
        - uuid: 0f4a40064c044043b37ecc79905f27bd
          name: 已挂载文件系统发现
          type: DEPENDENT
          key: vfs.fs.dependent.discovery
          delay: '0'
          filter:
            evaltype: AND
            conditions:
              - macro: '{#FSDRIVETYPE}'
                value: '{$VFS.FS.FSDRIVETYPE.MATCHES}'
                formulaid: A
              - macro: '{#FSDRIVETYPE}'
                value: '{$VFS.FS.FSDRIVETYPE.NOT_MATCHES}'
                operator: NOT_MATCHES_REGEX
                formulaid: B
              - macro: '{#FSNAME}'
                value: '{$VFS.FS.FSNAME.MATCHES}'
                formulaid: C
              - macro: '{#FSNAME}'
                value: '{$VFS.FS.FSNAME.NOT_MATCHES}'
                operator: NOT_MATCHES_REGEX
                formulaid: D
              - macro: '{#FSTYPE}'
                value: '{$VFS.FS.FSTYPE.MATCHES}'
                formulaid: E
              - macro: '{#FSTYPE}'
                value: '{$VFS.FS.FSTYPE.NOT_MATCHES}'
                operator: NOT_MATCHES_REGEX
                formulaid: F
          description: 发现不同类型的文件系统。
          item_prototypes:
            - uuid: f194856de89b40369b423c8f389b22b3
              name: 'FS [{#FSLABEL}({#FSNAME})]: 剩余空间'
              type: DEPENDENT
              key: 'vfs.fs.dependent.size[{#FSNAME},free]'
              delay: '0'
              units: B
              description: 可用存储空间，以字节表示。
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.bytes.free
              master_item:
                key: 'vfs.fs.dependent[{#FSNAME},data]'
              tags:
                - tag: component
                  value: storage
                - tag: filesystem
                  value: '{#FSNAME}'
                - tag: fstype
                  value: '{#FSTYPE}'
            - uuid: 1692718bef234531a428f2161d078677
              name: 'FS [{#FSLABEL}({#FSNAME})]: 使用率'
              type: DEPENDENT
              key: 'vfs.fs.dependent.size[{#FSNAME},pused]'
              delay: '0'
              value_type: FLOAT
              units: '%'
              description: 按当前使用的空间与最大可用空间的百分比计算。
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.bytes.pused
              master_item:
                key: 'vfs.fs.dependent[{#FSNAME},data]'
              tags:
                - tag: component
                  value: storage
                - tag: filesystem
                  value: '{#FSNAME}'
                - tag: fstype
                  value: '{#FSTYPE}'
              trigger_prototypes:
                - uuid: 4985a5b9f21c417c89562a779725726c
                  expression: 'min(/Windows zabbix agent customize active/vfs.fs.dependent.size[{#FSNAME},pused],5m)>{$VFS.FS.PUSED.MAX.WARN:"{#FSLABEL}({#FSNAME})"}'
                  name: Windows：磁盘空间不足
                  event_name: 'Windows: FS [{#FSLABEL}({#FSNAME})]: 空间不足 (used > {$VFS.FS.PUSED.MAX.WARN:"{#FSLABEL}({#FSNAME})"}%, total {{?last(//vfs.fs.dependent.size[{#FSNAME},total])/1024/1024/1024}.fmtnum(1)}GB)'
                  opdata: '已用空间: {{ITEM.LASTVALUE1}.fmtnum(1)}%'
                  priority: WARNING
                  description: |
                    该卷的空间使用率超过了`{$VFS.FS.PUSED.MAX.WARN:"{#FSNAME}"}%`的限制。
                    触发表达式基于当前已使用的空间和最大可用空间。
                    事件名称表示总体积空间，该空间可能不同于最大可用空间，具体取决于文件系统类型。
                  manual_close: 'YES'
                  dependencies:
                    - name: Windows：磁盘空间严重不足
                      expression: 'min(/Windows zabbix agent customize active/vfs.fs.dependent.size[{#FSNAME},pused],5m)>{$VFS.FS.PUSED.MAX.CRIT:"{#FSLABEL}({#FSNAME})"}'
                  tags:
                    - tag: scope
                      value: availability
                    - tag: scope
                      value: capacity
                - uuid: 8205b876097f4c6fba66b52bd0a1a58c
                  expression: 'min(/Windows zabbix agent customize active/vfs.fs.dependent.size[{#FSNAME},pused],5m)>{$VFS.FS.PUSED.MAX.CRIT:"{#FSLABEL}({#FSNAME})"}'
                  name: Windows：磁盘空间严重不足
                  event_name: 'Windows: FS [{#FSLABEL}({#FSNAME})]: Space is critically low (used > {$VFS.FS.PUSED.MAX.CRIT:"{#FSLABEL}({#FSNAME})"}%, total {{?last(//vfs.fs.dependent.size[{#FSNAME},total])/1024/1024/1024}.fmtnum(1)}GB)'
                  opdata: '已用空间: {{ITEM.LASTVALUE1}.fmtnum(1)}%'
                  priority: AVERAGE
                  description: |
                    该卷的空间使用率超过了`{$VFS.FS.PUSED.MAX.CRIT:"{#FSNAME}"}%`的限制。
                    触发表达式基于当前已使用的空间和最大可用空间。
                    事件名称表示总体积空间，该空间可能与最大可用空间不同，具体取决于文件系统类型。
                  manual_close: 'YES'
                  tags:
                    - tag: scope
                      value: availability
                    - tag: scope
                      value: capacity
            - uuid: 93b6a9a7dc2d444b8621fa5edb85ae91
              name: 'FS [{#FSLABEL}({#FSNAME})]: 总空间'
              type: DEPENDENT
              key: 'vfs.fs.dependent.size[{#FSNAME},total]'
              delay: '0'
              units: B
              description: 以字节表示的总空间。
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.bytes.total
              master_item:
                key: 'vfs.fs.dependent[{#FSNAME},data]'
              tags:
                - tag: component
                  value: storage
                - tag: filesystem
                  value: '{#FSNAME}'
                - tag: fstype
                  value: '{#FSTYPE}'
            - uuid: db9bf91bddc14d92ab49dbf7d5059a40
              name: 'FS [{#FSLABEL}({#FSNAME})]:已使用'
              type: DEPENDENT
              key: 'vfs.fs.dependent.size[{#FSNAME},used]'
              delay: '0'
              units: B
              description: 以字节表示的已用存储。
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.bytes.used
              master_item:
                key: 'vfs.fs.dependent[{#FSNAME},data]'
              tags:
                - tag: component
                  value: storage
                - tag: filesystem
                  value: '{#FSNAME}'
                - tag: fstype
                  value: '{#FSTYPE}'
            - uuid: 87f2e81e19a049f9bfb4c7614ed95d4a
              name: 'FS [{#FSLABEL}({#FSNAME})]: 获取数据'
              type: DEPENDENT
              key: 'vfs.fs.dependent[{#FSNAME},data]'
              delay: '0'
              history: 1h
              value_type: TEXT
              trends: '0'
              description: '文件系统的中间数据 `{#FSNAME}`'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.[?(@.fsname==''{#FSNAME}'')].first()'
              master_item:
                key: vfs.fs.get
              tags:
                - tag: component
                  value: raw
                - tag: component
                  value: storage
                - tag: filesystem
                  value: '{#FSNAME}'
                - tag: fstype
                  value: '{#FSTYPE}'
          master_item:
            key: vfs.fs.get
          lld_macro_paths:
            - lld_macro: '{#FSDRIVETYPE}'
              path: $.fsdrivetype
            - lld_macro: '{#FSLABEL}'
              path: $.fslabel
            - lld_macro: '{#FSNAME}'
              path: $.fsname
            - lld_macro: '{#FSTYPE}'
              path: $.fstype
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  var filesystems = JSON.parse(value);
                  
                  result = filesystems.map(function (filesystem) {
                  	return {
                  		'fsname': filesystem.fsname,
                  		'fstype': filesystem.fstype,
                  		'fslabel': filesystem.fslabel,
                  		'fsdrivetype': filesystem.fsdrivetype
                  	};
                  });
                  
                  return JSON.stringify(result);
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1h
      tags:
        - tag: class
          value: os
        - tag: target
          value: windows
      macros:
        - macro: '{$AGENT.NODATA_TIMEOUT}'
          value: 30m
          description: 活动代理无数据超时限制。建议保持较高值。
        - macro: '{$AGENT.TIMEOUT}'
          value: 5m
          description: 代理被视为不可用的超时时间。
        - macro: '{$CPU.UTIL.CRIT}'
          value: '90'
          description: CPU利用率的关键阈值，以百分比（%）表示。
        - macro: '{$MEMORY.UTIL.MAX}'
          value: '90'
          description: 内存利用率项目的预警阈值。
        - macro: '{$NET.IF.IFALIAS.MATCHES}'
          value: '.*'
          description: 用于网络接口发现。可在主机或关联模板级别覆盖。
        - macro: '{$NET.IF.IFALIAS.NOT_MATCHES}'
          value: CHANGE_THIS
          description: 用于网络接口发现。可以在宿主或链接模板级别覆盖。
